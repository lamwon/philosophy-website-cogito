<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--primary:#1A3A5C;--accent:#C9A96E;--bg:#F5F0EB;--card-bg:#fff;--text:#2C1810;--muted:#8B7355;
--radius:12px;--shadow:0 2px 12px rgba(0,0,0,0.06);--font:'Noto Serif SC',Georgia,serif;
}
body{background:var(--bg);color:var(--text);min-height:100vh;line-height:1.8;font-family:var(--font);-webkit-font-smoothing:antialiased}
.container{max-width:800px;margin:0 auto;padding:16px}
.card{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin-bottom:20px}
.card-title{font-size:18px;font-weight:700;margin-bottom:16px;color:var(--primary)}
.content{font-size:15px;line-height:1.8;white-space:pre-wrap;color:var(--text)}
.btn{padding:10px 24px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-family:var(--font);transition:opacity .2s}
.btn:hover{opacity:.85}
.btn-primary{background:var(--primary);color:#fff}
.btn-accent{background:var(--accent);color:#fff}
.btn-outline{background:transparent;border:2px solid var(--primary);color:var(--primary);border-radius:20px}
.btn-sm{border:1px solid #ddd;border-radius:20px;padding:6px 16px;cursor:pointer;font-size:13px;font-family:var(--font)}
.btn-sm.active{background:var(--primary);border-color:var(--primary);color:#fff}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;background:var(--bg);font-size:11px;color:var(--muted)}
.fade-in{animation:fadeIn .4s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes ellipsis{0%{opacity:.2}20%{opacity:1}40%{opacity:.2}100%{opacity:.2}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes ping{0%{transform:scale(1);opacity:1}100%{transform:scale(2);opacity:0}}
.page-enter{animation:slideUp .35s ease both}
@media(max-width:599px){.wisdom-grid{grid-template-columns:1fr!important}}@media(max-width:699px){.p-grid{grid-template-columns:repeat(2,1fr)!important}}
</style>
</head>

const PHILOSOPHERS = [
{id:"thales",name:"泰勒斯",englishName:"Thales",volume:1,era:"古希腊（前苏格拉底）",school:"米利都学派",summary:"西方哲学史上第一位哲学家，米利都学派创始人。提出「水是万物的本原」，认为一切事物皆源于水并复归于水，开创了用自然原因解释世界的理性传统。",keyWorks:["《论自然》（失传）"],oppositeIds:["anaximander"],famousQuote:"水是万物的本原。"},
{id:"anaximander",name:"阿那克西曼德",englishName:"Anaximander",volume:1,era:"古希腊（前苏格拉底）",school:"米利都学派",summary:"泰勒斯的学生，提出万物的本原是「无限者」（apeiron），一种无定形的永恒实体。首次提出宇宙演化论。",keyWorks:["《论自然》（失传）"],oppositeIds:["pythagoras"],famousQuote:"万物的本原是无限者。"},
{id:"pythagoras",name:"毕达哥拉斯",englishName:"Pythagoras",volume:1,era:"古希腊（前苏格拉底）",school:"毕达哥拉斯学派",summary:"数学家兼神秘主义者，提出「数是万物的本原」。认为宇宙的本质是数学和谐，灵魂可以通过净化达到不朽。",keyWorks:["残篇"],oppositeIds:["heraclitus"],famousQuote:"数是万物的本原。"},
{id:"heraclitus",name:"赫拉克利特",englishName:"Heraclitus",volume:1,era:"古希腊（前苏格拉底）",school:"艾菲斯学派",summary:"提出「万物流变」（Panta Rhei），认为世界是一团永恒的活火，对立面的斗争是万物生成的动力。",keyWorks:["《论自然》（残篇）"],oppositeIds:["parmenides"],famousQuote:"人不能两次踏进同一条河流。"},
{id:"parmenides",name:"巴门尼德",englishName:"Parmenides",volume:1,era:"古希腊（前苏格拉底）",school:"埃利亚学派",summary:"存在论奠基人，提出「存在者存在，非存在者不存在」。认为只有「存在」是真实的，变化和运动只是幻觉。",keyWorks:["《论自然》（残篇）"],oppositeIds:["heraclitus"],famousQuote:"存在者存在，非存在者不存在。"},
{id:"zeno",name:"芝诺",englishName:"Zeno of Elea",volume:1,era:"古希腊（前苏格拉底）",school:"埃利亚学派",summary:"巴门尼德的学生，以「芝诺悖论」闻名（阿喀琉斯追不上乌龟等），用归谬法捍卫老师的「存在是一」的学说。",keyWorks:["残篇"],oppositeIds:["aristotle"],famousQuote:"阿喀琉斯永远追不上乌龟。"},
{id:"empedocles",name:"恩培多克勒",englishName:"Empedocles",volume:1,era:"古希腊（前苏格拉底）",school:"多元论",summary:"提出「四根说」——水、火、土、气是万物之根，爱与恨是推动它们组合与分离的两种力量。",keyWorks:["《论自然》《净化篇》（残篇）"],oppositeIds:["parmenides"],famousQuote:"爱使万物结合，恨使万物分离。"},
{id:"anaxagoras",name:"阿那克萨戈拉",englishName:"Anaxagoras",volume:1,era:"古希腊（前苏格拉底）",school:"多元论",summary:"提出「种子说」和「努斯」（Nous，理性心灵）概念。认为万物由无限多种「种子」构成，努斯是推动秩序的力量。",keyWorks:["《论自然》（残篇）"],oppositeIds:["protagoras"],famousQuote:"努斯是万物秩序的原因。"},
{id:"protagoras",name:"普罗泰戈拉",englishName:"Protagoras",volume:1,era:"古希腊（前苏格拉底）",school:"智者派",summary:"最著名的智者，提出「人是万物的尺度」。擅长修辞术与辩论术，收费教授青年如何赢得诉讼和政治辩论。",keyWorks:["《论真理》《论神》（失传）"],oppositeIds:["socrates"],famousQuote:"人是万物的尺度。"},
{id:"socrates",name:"苏格拉底",englishName:"Socrates",volume:1,era:"古希腊（古典时期）",school:"苏格拉底学派",summary:"西方哲学奠基人之一。以「苏格拉底式诘问法」闻名——通过不断的追问迫使对方反思自己的无知。提出「德性即知识」，认为无人故意作恶。",keyWorks:["无著作，见于柏拉图对话录"],oppositeIds:["protagoras"],famousQuote:"我唯一知道的就是我一无所知。"},
{id:"plato",name:"柏拉图",englishName:"Plato",volume:1,era:"古希腊（古典时期）",school:"柏拉图学园",summary:"苏格拉底的学生，亚里士多德的老师。创立雅典学园，提出「理念论」——物质世界只是理念世界的影子。",keyWorks:["《理想国》《斐多篇》《会饮篇》"],oppositeIds:["diogenes"],famousQuote:"理念世界才是真正的实在。"},
{id:"aristotle",name:"亚里士多德",englishName:"Aristotle",volume:1,era:"古希腊（古典时期）",school:"逍遥学派",summary:"柏拉图的学生，亚历山大大帝的老师。百科全书式学者，创立逻辑学、伦理学、政治学、物理学等学科体系。",keyWorks:["《形而上学》《尼各马可伦理学》《政治学》"],oppositeIds:["plato"],famousQuote:"吾爱吾师，吾更爱真理。"},
{id:"diogenes",name:"第欧根尼",englishName:"Diogenes",volume:1,era:"古希腊（古典时期）",school:"犬儒学派",summary:"犬儒学派代表，崇尚极简生活，住在木桶里，公开蔑视社会习俗和权力。亚历山大大帝拜访他时，他说「别挡住我的阳光」。",keyWorks:["无著作"],oppositeIds:["plato"],famousQuote:"别挡住我的阳光。"},
{id:"epicurus",name:"伊壁鸠鲁",englishName:"Epicurus",volume:1,era:"古希腊（希腊化时期）",school:"伊壁鸠鲁学派",summary:"主张快乐是最高善，但这里的「快乐」不是放纵，而是精神的宁静（ataraxia）和身体的无痛苦（aponia）。友谊是幸福的重要来源。",keyWorks:["《致赫罗多德的信》《致美诺西斯的信》"],oppositeIds:["zenoCitium"],famousQuote:"快乐是幸福生活的起点和终点。"},
{id:"zenoC",name:"芝诺（基提翁）",englishName:"Zeno of Citium",volume:1,era:"古希腊（希腊化时期）",school:"斯多葛学派",summary:"斯多葛学派创始人。主张宇宙由理性（Logos）支配，人的幸福在于顺应自然和理性生活，不被情感和外在事物左右。",keyWorks:["《论人的本性》（残篇）"],oppositeIds:["epicurus"],famousQuote:"顺应自然即是德行。"},
{id:"plotinus",name:"普罗提诺",englishName:"Plotinus",volume:1,era:"古罗马",school:"新柏拉图主义",summary:"新柏拉图主义创始人，提出「太一」（The One）作为终极实在。万物从太一流溢而出，灵魂的最终目标是回归太一。",keyWorks:["《九章集》"],oppositeIds:["porphyry"],famousQuote:"太一超越一切存在和思想。"},
{id:"augustine",name:"奥古斯丁",englishName:"Augustine",volume:2,era:"教父哲学",school:"教父哲学",summary:"基督教神学奠基人之一，融合柏拉图主义与基督教教义。提出「上帝之城」与「人间之城」的二元历史观。",keyWorks:["《忏悔录》《上帝之城》"],oppositeIds:["pelagius"],famousQuote:"上帝啊，你为自己的缘故创造了我们，我们的心永不安宁，直到在你中安息。"},
{id:"boethius",name:"波埃修斯",englishName:"Boethius",volume:2,era:"中世纪早期",school:"经院哲学先驱",summary:"罗马哲学家，被称为「最后一位罗马人」。在狱中写下《哲学的慰藉》，探讨命运、自由意志与神的预知。",keyWorks:["《哲学的慰藉》"],oppositeIds:[],famousQuote:"哲学是真正的慰藉。"},
{id:"erigena",name:"埃里金纳",englishName:"John Scotus Eriugena",volume:2,era:"中世纪（加洛林文艺复兴）",school:"爱留根纳学派",summary:"中世纪早期最杰出的思想家。将新柏拉图主义与基督教结合，提出「自然四分法」。",keyWorks:["《论自然的区分》"],oppositeIds:[],famousQuote:"真正的哲学就是真正的宗教。"},
{id:"anselm",name:"安瑟尔谟",englishName:"Anselm",volume:2,era:"中世纪（经院哲学）",school:"经院哲学",summary:"坎特伯雷大主教，提出「本体论证明」——上帝是最完善的存在，因此必然存在。被誉为「最后一位教父和第一位经院哲学家」。",keyWorks:["《宣讲篇》《上帝为何化身为人》"],oppositeIds:["gaunilo"],famousQuote:"信仰寻求理解。"},
{id:"abelard",name:"阿伯拉尔",englishName:"Peter Abelard",volume:2,era:"中世纪（经院哲学）",school:"经院哲学",summary:"12世纪著名逻辑学家和神学家。以「理解为了信仰」的方法论闻名，强调在信仰之前要先理解。",keyWorks:["《是与否》《论三位一体》"],oppositeIds:["bernard"],famousQuote:"理解为了信仰。"},
{id:"aquinas",name:"托马斯·阿奎那",englishName:"Thomas Aquinas",volume:2,era:"中世纪（经院哲学）",school:"经院哲学",summary:"中世纪最伟大的经院哲学家。融合亚里士多德哲学与基督教神学，提出「五路证明」论证上帝存在。",keyWorks:["《神学大全》《反异教大全》"],oppositeIds:["averroes"],famousQuote:"恩典不会摧毁自然，而是成全自然。"},
{id:"ockham",name:"奥卡姆",englishName:"William of Ockham",volume:2,era:"中世纪（经院哲学）",school:"经院哲学（唯名论）",summary:"唯名论代表，以「奥卡姆剃刀」闻名——如无必要，勿增实体。主张个别事物才是真实存在的。",keyWorks:["《箴言注疏》"],oppositeIds:[],famousQuote:"如无必要，勿增实体。"},
{id:"bacon",name:"弗朗西斯·培根",englishName:"Francis Bacon",volume:3,era:"文艺复兴",school:"经验主义",summary:"现代科学方法论奠基人。提出「知识就是力量」，主张用归纳法取代经院哲学的演绎法，清除心灵的四种假象。",keyWorks:["《新工具》《论学术的进展》"],oppositeIds:[],famousQuote:"知识就是力量。"},
{id:"hobbes",name:"霍布斯",englishName:"Thomas Hobbes",volume:3,era:"近代（17世纪）",school:"政治哲学",summary:"《利维坦》作者，提出自然状态是「一切人对一切人的战争」，社会契约是走出自然状态的途径。",keyWorks:["《利维坦》"],oppositeIds:["locke"],famousQuote:"人对人是狼。"},
{id:"descartes",name:"笛卡尔",englishName:"René Descartes",volume:3,era:"近代（17世纪）",school:"理性主义",summary:"近代哲学之父。提出「我思故我在」，以普遍怀疑为方法，确立了主体性哲学的基础。",keyWorks:["《第一哲学沉思集》《方法论》"],oppositeIds:["hume"],famousQuote:"我思故我在。"},
{id:"spinoza",name:"斯宾诺莎",englishName:"Baruch Spinoza",volume:3,era:"近代（17世纪）",school:"理性主义",summary:"提出「实体即自然」的泛神论，认为上帝与自然是同一的。用几何学方法构建伦理学体系。",keyWorks:["《伦理学》《神学政治论》"],oppositeIds:[],famousQuote:"自由是对必然的认识。"},
{id:"leibniz",name:"莱布尼茨",englishName:"Gottfried Leibniz",volume:3,era:"近代（17-18世纪）",school:"理性主义",summary:"提出「单子论」和「前定和谐」理论。认为我们生活在「所有可能世界中最好的一个」。",keyWorks:["《单子论》《人类理解新论》"],oppositeIds:[],famousQuote:"我们生活在所有可能世界中最好的一个。"},
{id:"locke",name:"洛克",englishName:"John Locke",volume:3,era:"近代（17-18世纪）",school:"经验主义",summary:"经验主义巨匠，提出「白板说」——人心如白纸，一切知识来源于经验。社会契约论的重要奠基人。",keyWorks:["《人类理解论》《政府论》"],oppositeIds:["hobbes"],famousQuote:"知识来源于经验。"},
{id:"berkeley",name:"贝克莱",englishName:"George Berkeley",volume:3,era:"近代（18世纪）",school:"经验主义",summary:"提出「存在即被感知」的唯心主义经验论。认为物质实体不存在，所谓「物」只是感觉观念的集合。",keyWorks:["《人类知识原理》"],oppositeIds:[],famousQuote:"存在就是被感知。"},
{id:"hume",name:"休谟",englishName:"David Hume",volume:3,era:"近代（18世纪）",school:"经验主义",summary:"彻底的怀疑论者。否定因果关系的客观必然性，认为所谓因果关系只是习惯性联想。惊醒康德的独断论迷梦。",keyWorks:["《人性论》《人类理解研究》"],oppositeIds:["descartes"],famousQuote:"习惯是人生的伟大指南。"},
{id:"rousseau",name:"卢梭",englishName:"Jean-Jacques Rousseau",volume:3,era:"近代（18世纪）",school:"启蒙哲学",summary:"提出「人生而自由，却无往不在枷锁中」。崇尚自然状态，批判文明对人的异化。",keyWorks:["《社会契约论》《论人类不平等的起源》"],oppositeIds:[],famousQuote:"人生而自由，却无往不在枷锁中。"},
{id:"kant",name:"康德",englishName:"Immanuel Kant",volume:3,era:"近代（18世纪）",school:"德国古典哲学",summary:"「哥白尼式革命」的发起者。提出「人为自然立法」，物自体不可知。伦理学上的「定言令式」是道德的最高原则。",keyWorks:["《纯粹理性批判》《实践理性批判》《判断力批判》"],oppositeIds:[],famousQuote:"有两种东西，我对它们的思考越是深沉和持久，它们在我心灵中唤起的惊奇和敬畏就越历久弥新：头顶的星空和心中的道德法则。"},
{id:"hegel",name:"黑格尔",englishName:"G.W.F. Hegel",volume:3,era:"近代（19世纪）",school:"德国古典哲学",summary:"提出「绝对精神」辩证发展的体系。辩证法三环节：正题、反题、合题。认为「凡是现实的都是理性的」。",keyWorks:["《精神现象学》《逻辑学》《法哲学原理》"],oppositeIds:["schopenhauer"],famousQuote:"凡是现实的都是理性的。"},
{id:"schopenhauer",name:"叔本华",englishName:"Arthur Schopenhauer",volume:3,era:"近代（19世纪）",school:"意志哲学",summary:"唯意志论代表，认为世界的本质是「生命意志」。人生在欲望不满足时痛苦，满足后无聊，倡导通过艺术和禁欲超越。",keyWorks:["《作为意志和表象的世界》"],oppositeIds:["hegel"],famousQuote:"生命是一团欲望，欲望不满足便痛苦，满足便无聊。"},
{id:"nietzsche",name:"尼采",englishName:"Friedrich Nietzsche",volume:3,era:"近代（19世纪）",school:"生命哲学",summary:"「上帝死了」的宣告者。提出「权力意志」「超人哲学」「永恒轮回」等概念，对传统道德和基督教进行彻底的批判。",keyWorks:["《查拉图斯特拉如是说》《善恶的彼岸》"],oppositeIds:[],famousQuote:"上帝死了。"},
{id:"kierkegaard",name:"克尔凯郭尔",englishName:"Søren Kierkegaard",volume:3,era:"近代（19世纪）",school:"存在主义先驱",summary:"存在主义之父。强调「孤独个体」和「主观真理」，认为信仰是「纵身一跃」。批判黑格尔体系哲学忽略了个体存在。",keyWorks:["《非此即彼》《恐惧与战栗》"],oppositeIds:["hegel"],famousQuote:"信仰需要纵身一跃。"},
{id:"james",name:"威廉·詹姆斯",englishName:"William James",volume:3,era:"近代（19-20世纪）",school:"实用主义",summary:"实用主义创始人之一。提出「真理即有用」的实用主义真理观，认为一个观念的价值取决于它带来的实际效果。",keyWorks:["《实用主义》《心理学原理》"],oppositeIds:[],famousQuote:"真理即有用。"}
];

// 模拟回复（自然对话风格）
// ═══════════════════════════════════════════
function mockMatch(q,p,opp){
  const qf="「"+(p.famousQuote||"经典名言")+"」";
  const s=p.school,e=p.era,w=p.keyWorks&&p.keyWorks.length?p.keyWorks[0]:"其著作";
  return {
    oneliner:p.name+"说过："+qf+"。这看着在说"+s+"的道理，但放在你的处境里，它提醒你：纠结的根源可能不在外面，而在你衡量它的那杆秤。",
    analogy:"就像一个人拿了一把不准的尺子量桌子——量来量去都觉得桌子不对。他没想过是尺子的问题。"+p.name+"的“思想的尺子”就是这个意思。"+qf+"——这位"+e+"的思想家告诉你：真正需要审视的不是你的处境本身，而是你判断处境的那套标准。"+s+"最核心的追问就是：你以为天经地义的东西，真的那么天经地义吗？",
    deep:"拆解一下。"+p.name+"在"+w+"里提出"+qf+"。"+s+"的整个体系都建立在这个洞察上：我们看到的“世界”，已经被认知方式预先塑造了。你的处境你觉得棘手，是因为你已经默认了一些前提（事情应该怎样、别人应该怎样）。"+p.name+"的犀利在于：他让你回头检视前提本身。"+qf+"翻译成你今天的话就是：先搞清楚你的尺子准不准。",
    advice:"第一，写下你对这件事的三个“理所当然”——它们从哪来的？第二，挑一个最坚定的判断，问自己如果反过来才是对的呢？第三，把"+qf+"写在便利贴上贴一周，每次看到停下来想三秒。",
    alternateView:opp+"可能会说：反思前提当然好，但总不能一直反思不行动吧？"+p.name+"给你深度，"+opp+"给你灵活——两种智慧你都用得着。"
  };
}
function mockMismatch(q,p,opp){
  const qf="「"+(p.famousQuote||"经典名言")+"」";
  return {
    oneliner:p.name+"那会儿没想过你这种问题——但"+qf+"拿来硬套你的困惑，居然也能说通。",
    analogy:"拿你的困惑去找"+p.name+"，就像带一台智能手机去见一位"+p.era+"的人。TA不会用手机，但会把它翻来覆去研究半天，最后说出一句你从没想过的话——不是因为TA懂科技，而是TA看世界的角度跟你完全不一样。"+qf+"这种古老的话放在今天听，反而有奇怪的穿透力。",
    deep:"说实话，"+p.name+"的"+qf+"跟你的困惑本不在一个语境里。"+p.school+"关心的是另一套问题。但当你硬把古老的智慧贴到你的困惑旁边，两者之间会产生“创造性的误读”。"+qf+"被你重新解释了，你的困惑也被这句话重新照亮了——这是哲学活着的证据。",
    advice:"把"+qf+"写在便利贴上，贴在每天能看到的地方。每次看到问自己：如果这句话是真的，我的烦恼会变成什么？连续一周。",
    alternateView:opp+"肯定会说：牛头不对马嘴的，别瞎联系了。但重要的是——联系本身就有意义，这个动作本身就是哲学训练。"
  };
}

// ═══════════════════════════════════════════
// 打字机
// ═══════════════════════════════════════════
function typewrite(result){
  const keys=["oneliner","analogy","deep","advice","alternateView"];
  const labels=["一句话说清楚","生活类比","原文分析","生活建议","换个角度"];
  const emojis=["🧠","📖","🔬","💡","🤔"];
  let totalDelay=0,TYPING_SPEED=28,SECTION_DELAY=600;
  keys.forEach((key,i)=>{
    if(i>0) totalDelay+=SECTION_DELAY;
    const fullText=emojis[i]+" "+labels[i]+"："+result[key];
    const chars=[...fullText];
    setTimeout(()=>setState({activeSection:key}),totalDelay);
    chars.forEach((char,pos)=>{
      setTimeout(()=>{
        setState({typewriterText:Object.assign({},state.typewriterText,{[key]:(state.typewriterText[key]||"")+char})});
      },totalDelay+pos*TYPING_SPEED);
    });
    totalDelay+=chars.length*TYPING_SPEED;
  });
  setTimeout(()=>setState({typewriterDone:true}),totalDelay);
}

// 分析
// ═══════════════════════════════════════════
function startAnalysis(p){
  setState({loading:true,typewriterText:{},typewriterDone:false,analysis:null,activeSection:null,thinkingStage:0});
  if(thinkTimer) clearInterval(thinkTimer);
  thinkTimer=setInterval(()=>{
    setState({thinkingStage:(state.thinkingStage+1)%THINKING_STAGES.length});
  },1200);
  const opp=p.oppositeIds[0]?PHILOSOPHERS.find(ph=>ph.id===p.oppositeIds[0])?.name||"相反派":'相反派的哲学家';
  const result=state.isMismatch?mockMismatch(state.question,p,opp):mockMatch(state.question,p,opp);
  // 模拟延迟
  setTimeout(()=>{
    if(thinkTimer) clearInterval(thinkTimer);
    setState({loading:false,analysis:result});
    typewrite(result);
  },2000);
}

function drawShareCard(text,source,chapter,tradition,callback){
  // 先渲染一个占位
  const themeMap={buddhism:{bg1:"#FDF6F0",accent:"#D4836D",border:"#C8A96E",ornament:"🪷",title:"佛家·禅意"},
    daoism:{bg1:"#F0F5F2",accent:"#5D7A6E",border:"#8BA89A",ornament:"☯",title:"道家·自然"},
    confucianism:{bg1:"#F5F0EB",accent:"#8B4513",border:"#A67B5B",ornament:"📚",title:"儒家·修身"}};
  const theme=themeMap[tradition];
  callback({html:'<canvas id="shareCanvas" style="width:100%;max-width:360px;aspect-ratio:3/4;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.12);background:'+theme.bg1+'"></canvas><button onclick="downloadShareCard()" style="margin-top:12px;padding:10px 24px;border:2px solid var(--accent);border-radius:20px;background:transparent;color:var(--accent);cursor:pointer;font-size:13px;font-family:var(--font)">📷 保存图片</button>',draw:function(){
      const canvas=document.getElementById('shareCanvas');
      if(!canvas) return;
      const ctx=canvas.getContext('2d');
      const W=600,H=800;
      canvas.width=W;canvas.height=H;
      const grad=ctx.createLinearGradient(0,0,W,H);
      grad.addColorStop(0,theme.bg1);grad.addColorStop(1,themeMap[tradition].bg2||theme.bg1);
      ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
      ctx.strokeStyle=theme.border;ctx.lineWidth=2;ctx.strokeRect(24,24,W-48,H-48);
      ctx.font="40px 'Noto Serif SC','STSong',serif";ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText(theme.ornament,W/2,90);
      ctx.font="14px 'Noto Serif SC','STSong',serif";ctx.fillStyle=theme.accent;ctx.fillText(theme.title,W/2,130);
      ctx.strokeStyle=theme.accent;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(W/2-60,150);ctx.lineTo(W/2+60,150);ctx.stroke();
      ctx.fillStyle="#2C1810";ctx.textAlign="center";ctx.textBaseline="middle";
      const maxWidth=480,lineHeight=38;const displayText="「"+text+"」";
      ctx.font="24px 'Noto Serif SC','STSong',serif";
      let lines=[];let cur="";
      for(let c of displayText){let t=cur+c;if(ctx.measureText(t).width>maxWidth&&cur){lines.push(cur);cur=c}else cur=t}
      if(cur) lines.push(cur);
      if(lines.length===0) lines=[displayText];
      const startY=280;
      lines.forEach((l,i)=>{ctx.font=(i===0?24:22)+"px 'Noto Serif SC','STSong',serif";ctx.fillText(l,W/2,startY+i*lineHeight);});
      const srcY=startY+lines.length*lineHeight+50;
      ctx.font="16px 'Noto Serif SC','STSong',serif";ctx.fillStyle=theme.accent;
      ctx.fillText("—— "+source+(chapter?" · "+chapter:""),W/2,srcY);
      ctx.font="13px 'Noto Serif SC','STSong',serif";ctx.fillStyle=theme.border;
      ctx.fillText("我在故我在 · 思辨即生活",W/2,H-80);
      window.shareCardData={canvas,tradition};
    }};
}
function downloadShareCard(){
  const c=document.getElementById('shareCanvas');
  if(!c) return;
  const link=document.createElement('a');link.download='wisdom-'+window.shareCardData?.tradition+'.png';
  link.href=c.toDataURL('image/png');link.click();
}

    html+='<div class="card fade-in">';
    if(s.loading){
      html+='<div style="text-align:center;padding:60px 20px">';
      html+='<div style="width:40px;height:40px;margin:0 auto 24px"><div style="width:40px;height:40px;border:2px solid var(--bg);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite"></div></div>';
      html+='<div style="font-size:16px;color:var(--text);font-weight:500;margin-bottom:12px;letter-spacing:.05em">'+(s.philosopher?.name||'哲学家')+' 正在思考<span style="animation:ellipsis 1.8s infinite">...</span></div>';
      html+='<div style="font-size:14px;color:var(--muted);min-height:22px;opacity:0.7">'+THINKING_STAGES[s.thinkingStage]+'</div></div>';
    } else {
      html+='<div style="margin-bottom:20"><div style="font-size:13px;color:var(--muted);margin-bottom:4">你的问题</div>';
      html+='<div style="font-size:15px;font-weight:600;color:var(--primary)">“'+escHtml(s.question)+'”</div>';
      html+='<div style="font-size:13px;color:var(--muted);margin-top:4">回应者：'+escHtml(s.philosopher?.name||'')+' · '+escHtml(s.philosopher?.school||'')+(s.isMismatch?' <span style="color:var(--accent)">⚡反差模式</span>':'')+'</div></div><hr style="border:none;border-top:1px solid var(--bg);margin-bottom:20">';
      const SECTION_ORDER=["oneliner","analogy","deep","advice","alternateView"];
      const SECTION_LABELS=["一句话说清楚","生活类比","原文分析","生活建议","换个角度"];
      const activeIdx=s.activeSection?SECTION_ORDER.indexOf(s.activeSection):-1;
      SECTION_ORDER.forEach((key,i)=>{
        if(activeIdx===-1||i>activeIdx) return;
        const content=s.typewriterText[key]||"";
        const isActive=key===s.activeSection;
        html+='<div style="margin-bottom:20;opacity:'+(content?1:0)+';transform:'+(content?'translateY(0)':'translateY(4px)')+';transition:opacity .2s ease,transform .2s ease">';
        html+='<div style="font-size:15px;line-height:1.8;white-space:pre-wrap;color:var(--text)">'+escHtml(content);
        if(isActive&&!s.typewriterDone) html+='<span style="display:inline-block;width:2px;height:1em;background:var(--primary);margin-left:2px;animation:blink .8s infinite;vertical-align:text-bottom">|</span>';
        html+='</div></div>';
      });
      if(s.typewriterDone){
        html+='<button onclick="setState({step:4})" style="width:100%;padding:12px 0;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:15px;font-family:var(--font);cursor:pointer;margin-top:10px">我要结语 →</button>';
      }
    }
    html+='</div>';
  }

  // ═══ Step 4 ═══
  if(step===4){
    html+='<div class="fade-in"><div class="card"><div class="card-title">以东方智慧收尾</div>';
    html+='<div class="wisdom-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">';
    const wCards=[
      {id:"buddhism",name:"佛",color:"#D4836D",bg:"linear-gradient(135deg,#FDF6F0,#F5E6DA)",icon:"🕉"},
      {id:"daoism",name:"道",color:"#5D7A6E",bg:"linear-gradient(135deg,#F0F5F2,#E0EDE5)",icon:"☯"},
      {id:"confucianism",name:"儒",color:"#8B4513",bg:"linear-gradient(135deg,#F5F0EB,#EDE0D5)",icon:"📚"}
    ];
    wCards.forEach(c=>{
      const act=s.wisdom===c.id;
      html+='<div onclick="selectWisdom(\''+c.id+'\')" style="padding:24px 16px;border-radius:12px;text-align:center;cursor:pointer;background:'+c.bg+';color:'+c.color+';border:'+(act?'3px solid var(--accent)':'3px solid transparent')+';min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center">';
      html+='<div style="font-size:36px;margin-bottom:8px">'+c.icon+'</div><div style="font-size:20px;font-weight:700">'+c.name+'</div></div>';
    });
    html+='</div></div>';

    if(s.wisdomQuote){
      html+='<div id="shareCardContainer" style="margin-bottom:20"></div>';
      html+='<div style="background:linear-gradient(135deg,var(--primary),#2C5F7A);color:#fff;border-radius:12px;padding:32px;text-align:center">';
      html+='<div style="font-size:12px;opacity:.5;margin-bottom:8">'+(s.wisdom==='buddhism'?'佛家·禅意':s.wisdom==='daoism'?'道家·自然':'儒家·修身')+'</div>';
      html+='<div style="font-size:22px;line-height:1.8;margin-bottom:12;font-style:italic">「'+escHtml(s.wisdomQuote.text)+'」</div>';
      html+='<div style="font-size:14px;opacity:.7;margin-bottom:16">—— '+escHtml(s.wisdomQuote.source)+(s.wisdomQuote.chapter?' · '+escHtml(s.wisdomQuote.chapter):'')+'</div>';
      html+='<div style="font-size:15px;line-height:1.6;background:rgba(255,255,255,0.1);padding:16px;border-radius:8px;margin-bottom:20">'+escHtml(s.wisdomQuote.explanation)+'</div>';
      html+='<button onclick="shareWisdom()" style="padding:10px 24px;border:2px solid rgba(255,255,255,0.3);border-radius:20px;background:transparent;color:#fff;cursor:pointer;font-size:13px;font-family:var(--font)">📱 分享到朋友圈</button>';
      html+='</div>';
    }
    html+='<button onclick="restart()" style="display:block;margin:30px auto 0;padding:12px 40px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:15px;font-family:var(--font);cursor:pointer">再来一次 🔄</button>';
    html+='</div>';
  }

  html+='</div>';
  app.innerHTML=html;

  // 通用内联 keyframes
  if(!document.getElementById('dykfs')){
    const st=document.createElement('style');st.id='dykfs';
    st.textContent='@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}';
    document.head.appendChild(st);
  }

  // Step 4: 绘制 Canvas 分享卡
  if(step===4&&s.wisdomQuote){
    const container=document.getElementById('shareCardContainer');
    if(container){
      container.innerHTML='<div style="text-align:center;padding:20px;color:var(--muted)"><div style="width:30px;height:30px;margin:0 auto 12px;border:2px solid var(--bg);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite"></div>加载中...</div>';
      drawShareCard(s.wisdomQuote.text,s.wisdomQuote.source,s.wisdomQuote.chapter,s.wisdom,function(r){
        container.innerHTML=r.html;
        document.fonts.ready.then(()=>setTimeout(r.draw,100));
      });
    }
  }
}

function escHtml(s){if(!s) return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ═══════════════════════════════════════════
// 事件处理
// ═══════════════════════════════════════════
function selectQ(q){setState({question:q,step:2});}
function customSubmit(){
  const inp=document.getElementById('customQ');
  if(!inp||!inp.value.trim()) return;
  setState({question:inp.value.trim(),step:2});
}
function randomPick(){
  const pool=PHILOSOPHERS.filter(p=>p.volume===state.volume);
  if(pool.length){
    const p=pool[Math.floor(Math.random()*pool.length)];
    state.philosopher=p;state.step=3;
    render();startAnalysis(p);
  }
}
function selectP(id){
  const p=PHILOSOPHERS.find(x=>x.id===id);
  if(!p) return;
  state.philosopher=p;state.step=3;
  render();startAnalysis(p);
}
function selectWisdom(t){
  const list=WISDOM[t]||[];
  const q=list[Math.floor(Math.random()*list.length)]||null;
  setState({wisdom:t,wisdomQuote:q});
}
function shareWisdom(){
  if(!state.wisdomQuote) return;
  const txt="「"+state.wisdomQuote.text+"」— "+state.wisdomQuote.source+"\n来自「我在故我在」哲学网站";
  navigator.clipboard.writeText(txt).then(()=>alert("已复制到剪贴板！")).catch(()=>{const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert("已复制到剪贴板！");});
}
function restart(){
  if(thinkTimer) clearInterval(thinkTimer);
  state={step:1,category:null,question:"",philosopher:null,isMismatch:false,volume:1,search:"",analysis:null,loading:false,wisdom:null,wisdomQuote:null,activeSection:null,typewriterText:{},typewriterDone:false,thinkingStage:0};
  render();
}

// ═══ 启动 ═══
render();
</script>
</body>
</html>

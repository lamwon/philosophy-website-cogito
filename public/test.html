var PP = [{"id":"thales","name":"泰勒斯","en":"Thales","v":1,"era":"古希腊（前苏格拉底）","school":"米利都学派","sum":"西方哲学史上第一位哲学家。提出「水是万物的本原」。","kw":["《论自然》（失传）"],"opp":"anaximander","fq":"水是万物的本原。","hr":"必须追问用户问题中那个被视为「最基本、不容置疑」的前提是什么。用户以为的「本原」可能只是表象。"},{"id":"anaximander","name":"阿那克西曼德","en":"Anaximander","v":1,"era":"古希腊（前苏格拉底）","school":"米利都学派","sum":"提出万物的本原是「无限者」。","kw":["《论自然》（失传）"],"opp":"pythagoras","fq":"万物的本原是无限者。","hr":"必须用「无限者」视角指出用户把自己限定在了太小的框架里。真正的答案在边界之外。"},{"id":"pythagoras","name":"毕达哥拉斯","en":"Pythagoras","v":1,"era":"古希腊（前苏格拉底）","school":"毕达哥拉斯学派","sum":"提出「数是万物的本原」。","kw":["残篇"],"opp":"heraclitus","fq":"数是万物的本原。","hr":"必须用「数」的结构化思维帮用户把模糊的困扰拆解成可量化的对立关系。答案在比例与和谐中。"},{"id":"heraclitus","name":"赫拉克利特","en":"Heraclitus","v":1,"era":"古希腊（前苏格拉底）","school":"艾菲斯学派","sum":"提出「万物流变」，世界是一团永恒的活火。","kw":["《论自然》（残篇）"],"opp":"parmenides","fq":"人不能两次踏进同一条河流。","hr":"必须用「万物流变」指出用户抗拒变化本身才是痛苦的根源。对立面不是敌人，而是同一件事的两面。"},{"id":"parmenides","name":"巴门尼德","en":"Parmenides","v":1,"era":"古希腊（前苏格拉底）","school":"埃利亚学派","sum":"提出「存在者存在，非存在者不存在」。","kw":["《论自然》（残篇）"],"opp":"heraclitus","fq":"存在者存在，非存在者不存在。","hr":"必须用「存在者存在」的同一性逻辑揭示用户的问题建立在「变化」的幻觉上。答案在不变的存在本身。"},{"id":"zeno","name":"芝诺","en":"Zeno of Elea","v":1,"era":"古希腊（前苏格拉底）","school":"埃利亚学派","sum":"以「芝诺悖论」闻名。","kw":["残篇"],"opp":"aristotle","fq":"阿喀琉斯永远追不上乌龟。","hr":"必须用「悖论」揭示用户问题中的逻辑矛盾，让用户自己发现困境在理性上根本不成立。不是要解决，而是要消解。"},{"id":"empedocles","name":"恩培多克勒","en":"Empedocles","v":1,"era":"古希腊（前苏格拉底）","school":"多元论","sum":"提出「四根说」——水、火、土、气是万物之根。","kw":["《论自然》（残篇）"],"opp":"parmenides","fq":"爱使万物结合，恨使万物分离。","hr":"必须用「四根说」的多元视角指出用户被单一的解释框架困住了。爱与恨两种力量同时作用，用户只看到一面。"},{"id":"anaxagoras","name":"阿那克萨戈拉","en":"Anaxagoras","v":1,"era":"古希腊（前苏格拉底）","school":"多元论","sum":"提出「种子说」和「努斯」概念。","kw":["《论自然》（残篇）"],"opp":"protagoras","fq":"努斯是万物秩序的原因。","hr":"必须用「努斯」概念帮用户重新看见整体的秩序。答案不是拆解，而是用一个超越性的心灵视角来重新秩序化处境。"},{"id":"protagoras","name":"普罗泰戈拉","en":"Protagoras","v":1,"era":"古希腊（前苏格拉底）","school":"智者派","sum":"提出「人是万物的尺度」。","kw":["《论真理》（失传）"],"opp":"socrates","fq":"人是万物的尺度。","hr":"必须指出用户以为的客观困境其实是主观判断的产物。问题的关键不在事情本身，而在于用户如何衡量它。"},{"id":"socrates","name":"苏格拉底","en":"Socrates","v":1,"era":"古希腊（古典时期）","school":"苏格拉底学派","sum":"以「苏格拉底式诘问法」闻名。提出「德性即知识」。","kw":["无著作，见于柏拉图对话录"],"opp":"protagoras","fq":"我唯一知道的就是我一无所知。","hr":"必须用「诘问法」——不能直接给答案，通过连续追问逼用户自己发现矛盾。每一句分析都应以问号结尾或引出下一个追问。"},{"id":"plato","name":"柏拉图","en":"Plato","v":1,"era":"古希腊（古典时期）","school":"柏拉图学园","sum":"提出「理念论」——物质世界只是理念世界的影子。","kw":["《理想国》《斐多篇》《会饮篇》"],"opp":"diogenes","fq":"理念世界才是真正的实在。","hr":"必须用「理念论」指出用户看到的困境只是「洞穴里的影子」。真正的问题不在现象层面，而在用户从未审视过的理念前提。"},{"id":"aristotle","name":"亚里士多德","en":"Aristotle","v":1,"era":"古希腊（古典时期）","school":"逍遥学派","sum":"百科全书式学者，创立逻辑学、伦理学等学科体系。","kw":["《形而上学》《尼各马可伦理学》《政治学》"],"opp":"plato","fq":"吾爱吾师，吾更爱真理。","hr":"必须用「四因说」或「中庸之道」帮用户区分质料因、形式因、动力因和目的因。答案在「适度」和「现实化」之中。"},{"id":"diogenes","name":"第欧根尼","en":"Diogenes","v":1,"era":"古希腊（古典时期）","school":"犬儒学派","sum":"崇尚极简生活，住在木桶里。","kw":["无著作"],"opp":"plato","fq":"别挡住我的阳光。","hr":"必须用「犬儒式颠覆」指出用户的痛苦来自「想要太多不必要的虚饰」。最极端的简化就是解放。用讽刺和反诘。"},{"id":"epicurus","name":"伊壁鸠鲁","en":"Epicurus","v":1,"era":"古希腊（希腊化时期）","school":"伊壁鸠鲁学派","sum":"主张快乐是最高善，但指的是精神的宁静。","kw":["《致美诺西斯的信》"],"opp":"zenoC","fq":"快乐是幸福生活的起点和终点。","hr":"必须用「灵魂宁静」标准帮用户区分必要的欲望、自然的但不必要的欲望和虚妄的欲望。烦恼来自第三种。"},{"id":"zenoC","name":"芝诺（基提翁）","en":"Zeno of Citium","v":1,"era":"古希腊（希腊化时期）","school":"斯多葛学派","sum":"主张幸福在于顺应自然和理性生活。","kw":["《论人的本性》（残篇）"],"opp":"epicurus","fq":"顺应自然即是德行。","hr":"必须用「二分法」帮用户区分能控制的事和不能控制的事。真正的自由只在于前者。情绪必须被理性审视。"},{"id":"plotinus","name":"普罗提诺","en":"Plotinus","v":1,"era":"古罗马","school":"新柏拉图主义","sum":"提出「太一」作为终极实在。","kw":["《九章集》"],"opp":"","fq":"太一超越一切存在和思想。","hr":"必须用「太一」的流溢说指出用户的困境源于离源头太远了。答案不是修补具体问题，而是回到更本源的层面。"},{"id":"augustine","name":"奥古斯丁","en":"Augustine","v":2,"era":"教父哲学","school":"教父哲学","sum":"融合柏拉图主义与基督教教义。","kw":["《忏悔录》《上帝之城》"],"opp":"","fq":"我们的心永不安宁，直到在你中安息。","hr":"必须用「忏悔」式的内心审视指出用户的焦虑源于把有限之物当作终极依靠。心安的方向是转向内在。"},{"id":"boethius","name":"波埃修斯","en":"Boethius","v":2,"era":"中世纪早期","school":"经院哲学先驱","sum":"在狱中写下《哲学的慰藉》。","kw":["《哲学的慰藉》"],"opp":"","fq":"哲学是真正的慰藉。","hr":"必须指出命运女神的轮转是必然的，真正的幸福不在外在运气中，而在灵魂的内在善好。哲学是慰藉。"},{"id":"erigena","name":"埃里金纳","en":"John Scotus Eriugena","v":2,"era":"中世纪","school":"爱留根纳学派","sum":"将新柏拉图主义与基督教结合。","kw":["《论自然的区分》"],"opp":"","fq":"真正的哲学就是真正的宗教。","hr":"必须用「自然区分」的四重框架帮用户区分创造与被造、可见与不可见。答案在超越二元的统一中。"},{"id":"anselm","name":"安瑟尔谟","en":"Anselm","v":2,"era":"中世纪","school":"经院哲学","sum":"提出「本体论证明」。","kw":["《宣讲篇》"],"opp":"","fq":"信仰寻求理解。","hr":"必须用「本体论证明」式的逻辑帮用户从概念中存在推导出实在中存在。用户的问题是没有把隐含的前提推到底。"},{"id":"abelard","name":"阿伯拉尔","en":"Peter Abelard","v":2,"era":"中世纪","school":"经院哲学","sum":"强调「理解为了信仰」。","kw":["《是与否》"],"opp":"","fq":"理解为了信仰。","hr":"必须用「辩证法」和「意图论」指出问题的核心不在行为本身而在意图。理解了动机才能判断对错。"},{"id":"aquinas","name":"托马斯·阿奎那","en":"Thomas Aquinas","v":2,"era":"中世纪","school":"经院哲学","sum":"融合亚里士多德与基督教神学，提出「五路证明」。","kw":["《神学大全》"],"opp":"","fq":"恩典不会摧毁自然，而是成全自然。","hr":"必须用「自然法」和因果推理帮用户从效果回溯原因，从偶然推导必然。自然的秩序中有答案。"},{"id":"ockham","name":"奥卡姆","en":"William of Ockham","v":2,"era":"中世纪","school":"唯名论","sum":"以「奥卡姆剃刀」闻名——如无必要，勿增实体。","kw":["《箴言注疏》"],"opp":"","fq":"如无必要，勿增实体。","hr":"必须用「奥卡姆剃刀」指出用户过度复杂化了问题。用户自己添加了多少不必要的假设？直接删掉它们。"},{"id":"bacon","name":"培根","en":"Francis Bacon","v":3,"era":"文艺复兴","school":"经验主义","sum":"提出「知识就是力量」，主张归纳法。","kw":["《新工具》"],"opp":"","fq":"知识就是力量。","hr":"必须帮用户识别自己脑子里的四类假象（种族、洞穴、市场、剧场）。真正的知识来自观察和实验，不是先入为主的偏见。"},{"id":"hobbes","name":"霍布斯","en":"Thomas Hobbes","v":3,"era":"近代（17世纪）","school":"政治哲学","sum":"《利维坦》作者，提出自然状态是「一切人对一切人的战争」。","kw":["《利维坦》"],"opp":"locke","fq":"人对人是狼。","hr":"必须指出用户的问题本质上是一场权力博弈。自我保存是根本驱动力，理解了这个才能看透人际关系中的利益本质。"},{"id":"descartes","name":"笛卡尔","en":"Rene Descartes","v":3,"era":"近代（17世纪）","school":"理性主义","sum":"近代哲学之父。提出「我思故我在」。","kw":["《第一哲学沉思集》"],"opp":"hume","fq":"我思故我在。","hr":"必须用「普遍怀疑」帮用户把一切可怀疑的事情悬搁起来，找到一个不可怀疑的基点。从这个基点重新构建认知。"},{"id":"spinoza","name":"斯宾诺莎","en":"Baruch Spinoza","v":3,"era":"近代（17世纪）","school":"理性主义","sum":"提出「实体即自然」的泛神论。","kw":["《伦理学》"],"opp":"","fq":"自由是对必然的认识。","hr":"必须帮用户从「永恒相」而非「时间相」看问题。理解了必然性就是自由。情绪是被动的想象力，要用理性去理解。"},{"id":"leibniz","name":"莱布尼茨","en":"Gottfried Leibniz","v":3,"era":"近代（17-18世纪）","school":"理性主义","sum":"提出「单子论」和「前定和谐」。","kw":["《单子论》"],"opp":"","fq":"我们生活在所有可能世界中最好的一个。","hr":"必须用「前定和谐」和「充足理由律」指出用户的问题在更大的和谐框架中自有其位置。每件事的发生都有充足的理由。"},{"id":"locke","name":"洛克","en":"John Locke","v":3,"era":"近代（17-18世纪）","school":"经验主义","sum":"提出「白板说」——人心如白纸。","kw":["《人类理解论》"],"opp":"hobbes","fq":"知识来源于经验。","hr":"必须帮用户区分第一性质和第二性质。用户的问题来自混淆了客观属性与主观感受，把感觉当成了事物的属性。"},{"id":"berkeley","name":"贝克莱","en":"George Berkeley","v":3,"era":"近代（18世纪）","school":"经验主义","sum":"提出「存在即被感知」。","kw":["《人类知识原理》"],"opp":"","fq":"存在就是被感知。","hr":"必须指出用户的困境只在被感知和思考时才存在。换个感知方式，换个角度，问题就消失或变了。"},{"id":"hume","name":"休谟","en":"David Hume","v":3,"era":"近代（18世纪）","school":"经验主义","sum":"彻底的怀疑论者，否定因果关系的客观必然性。","kw":["《人性论》"],"opp":"descartes","fq":"习惯是人生的伟大指南。","hr":"必须指出用户所谓的必然性只是心理习惯，不是客观规律。因果关系和自我同一性都没有绝对保证——你只是习惯了这么看。"},{"id":"rousseau","name":"卢梭","en":"Jean-Jacques Rousseau","v":3,"era":"近代（18世纪）","school":"启蒙哲学","sum":"提出「人生而自由，却无往不在枷锁中」。","kw":["《社会契约论》"],"opp":"","fq":"人生而自由，却无往不在枷锁中。","hr":"必须帮用户区分来自天性的冲动和来自社会的外来压力。很多痛苦是文明带来的虚伪需要的产物，不是人真正的需要。"},{"id":"kant","name":"康德","en":"Immanuel Kant","v":3,"era":"近代（18世纪）","school":"德国古典哲学","sum":"发起「哥白尼式革命」，提出「人为自然立法」。","kw":["《纯粹理性批判》"],"opp":"","fq":"头顶的星空和心中的道德法则。","hr":"必须帮用户区分现象和物自体。问题不在于世界本身是怎样的，而在于用户的认知形式是怎么构造这个问题的。人为自然立法。"},{"id":"hegel","name":"黑格尔","en":"G.W.F. Hegel","v":3,"era":"近代（19世纪）","school":"德国古典哲学","sum":"提出「绝对精神」辩证发展的体系。","kw":["《精神现象学》"],"opp":"schopenhauer","fq":"凡是现实的都是理性的。","hr":"必须用「辩证法」分析——用户现在的困境是正题，找到它的对立面，上升到更高层次的统一。真理是整体，不是片面的判断。"},{"id":"schopenhauer","name":"叔本华","en":"Arthur Schopenhauer","v":3,"era":"近代（19世纪）","school":"意志哲学","sum":"认为世界的本质是「生命意志」。","kw":["《作为意志和表象的世界》"],"opp":"hegel","fq":"生命是一团欲望。","hr":"必须指出用户看似理性的分析背后是被盲目的生命意志驱使的。痛苦来自意志的无尽欲求。解脱来自审美和同情。"},{"id":"nietzsche","name":"尼采","en":"Friedrich Nietzsche","v":3,"era":"近代（19世纪）","school":"生命哲学","sum":"「上帝死了」的宣告者。提出「权力意志」。","kw":["《查拉图斯特拉如是说》"],"opp":"","fq":"上帝     deep: p.name + '在' + (p.kw&&p.kw[0]||'其著作') + '里说' + Q + '。注意这句话的锋利之处：它不教你如何应付困境，而是教你审视困境是怎么构成的。' + p.school + '之所以穿透力强，是因为它不满足于「解决问题」——它先追问「你把什么当成了问题」。你说的「' + q + '」里，至少有三个你自己没意识到的预设。把这三个预设拆掉，问题会变成另一个东西。而' + p.name + '给你的不是答案，是拆预设的工具。',
    advice: p.name + '的方法不是列清单，而是给你一面镜子：把' + Q + '抄下来贴在墙上。接下来一周，每次你为「' + q + '」感到焦虑时，站在这句话面前问自己：如果' + p.name + '是对的，我现在纠结的这个点，属于「事物本身」还是「我认知它的方式」？你会发现，大部分焦虑属于后者。而' + p.school + '的整个修行就是：当你意识到尺子是歪的那一刻，尺子就已经正了一点点。',
    alt: opp + '如果看到我这么分析，可能会说：绕来绕去的，不如直接解决问题。但' + p.name + '会回应：不先检查认知框架，你解决了一万个问题，第一个问法就是错的。' + opp + '的实用主义让你走得快，' + p.name + '的先验批判让你走得对。两者缺一不可。'
  };
}

function tw(r){
  var els = document.querySelectorAll('.analysis-section');
  var totalTime = 0;
  els.forEach(function(el, i){
    var twEl = el.querySelector('.typewriter');
    if(!twEl) return;
    var text = twEl.textContent;
    twEl.textContent = '';
    var delay = 200 + i * 200;
    setTimeout(function(){
      el.style.opacity = '1';
      var pos = 0;
      var timer = setInterval(function(){
        twEl.textContent += text.charAt(pos);
        pos++;
        if(pos >= text.length){ clearInterval(timer); }
      }, 20);
    }, delay);
    var secTime = delay + text.length * 20;
    if(secTime > totalTime) totalTime = secTime;
  });
  setTimeout(function(){ st({td:true}); }, totalTime + 100);
}

    var qs=s.cat?CAT.find(function(c){return c.id===s.cat}).qs:allQ;
    qs.forEach(function(q){h+='<div onclick="st({q:this.textContent,step:2})" style="padding:12px 16px;border-radius:8px;background:var(--bg);cursor:pointer;font-size:14px;border:2px solid transparent">'+esc(q)+'</div>';});
    h+='</div><div style="display:flex;gap:8px;margin-top:16px"><input id="cqi" placeholder="或者自己描述你的困惑..." style="flex:1;padding:12px 16px;border:2px solid #ddd;border-radius:8px;font-size:14px;font-family:var(--font);outline:none"><button onclick="var v=document.getElementById(\'cqi\').value;if(v.trim()){S.q=v.trim();S.step=2;App()}" style="padding:12px 24px;border:none;border-radius:8px;background:var(--primary);color:#fff;cursor:pointer;font-size:14px;font-family:var(--font)">确定</button></div></div>';
  }

  if(s1===2){
    h+='<div class="card fade-in"><div class="card-title">选一位哲学家来回应你</div>';
    h+='<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center">';
    h+='<button onclick="var p=PP.filter(function(x){return x.v===S.vol});if(p.length){var pp=p[Math.floor(Math.random()*p.length)];S.phil=pp;S.step=3;App();go(pp)}" style="padding:8px 20px;border:2px solid var(--primary);border-radius:20px;background:transparent;color:var(--primary);cursor:pointer;font-size:13px;font-family:var(--font)">随缘试试</button>';
    h+='<label style="font-size:13px;color:var(--muted);display:flex;align-items:center;gap:8px">反差模式 <input type="checkbox" '+(s.mis?'checked':'')+' onchange="st({mis:this.checked})" style="width:40px;height:20px;cursor:pointer"></label></div>';
    h+='<input value="'+esc(s.sch)+'" oninput="st({sch:this.value})" placeholder="搜索哲学家..." style="width:100%;padding:10px 16px;border:2px solid #ddd;border-radius:8px;font-size:14px;font-family:var(--font);outline:none;margin-bottom:16px">';
    h+='<div style="font-size:13px;color:var(--muted);margin-bottom:16px">找到 '+f.length+' 位哲学家</div><div style="display:flex;gap:4px;margin-bottom:16px">';
    [1,2,3].forEach(function(v){var a=s.vol===v;h+='<button onclick="st({vol:'+v+',sch:\'\'})" style="padding:8px 20px;border-radius:8px 8px 0 0;cursor:pointer;background:'+(a?'var(--card-bg)':'var(--bg)')+';border:none;font-size:13px;font-family:var(--font);font-weight:'+(a?700:400)+';color:'+(a?'var(--primary)':'var(--text)')+'">'+(v===1?'古典':v===2?'中古':'近现代')+'</button>';});
    h+='</div><div class="p-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px">';
    f.forEach(function(p){h+='<div onclick="S.phil=PP.find(function(x){return x.id==\''+p.id+'\'});S.step=3;App();go(S.phil)" style="padding:16px;border-radius:12px;background:var(--bg);cursor:pointer;text-align:center;border:2px solid '+(s.phil&&s.phil.id===p.id?'var(--accent)':'transparent')+'"><div style="width:48px;height:48px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto 8px;font-size:18px;font-weight:700">'+p.en.charAt(0)+'</div><div style="font-size:14px;font-weight:600">'+p.name+'</div><div style="font-size:11px;color:var(--muted);margin-top:4px">'+p.school+'</div></div>';});
  }

  if(s1===3){
    h+='<div class="card fade-in">';
    if(s.load){h+='<div style="text-align:center;padding:60px 20px"><div style="width:40px;height:40px;margin:0 auto 24px"><div style="width:40px;height:40px;border:2px solid var(--bg);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite"></div></div><div style="font-size:16px;color:var(--text);font-weight:500;margin-bottom:12px">'+(s.phil?esc(s.phil.name):'哲学家')+' 正在思考<span style="animation:ellipsis 1.8s infinite">...</span></div><div style="font-size:14px;color:var(--muted);opacity:0.7">'+ST[s.sg]+'</div></div>';}
    else {
      h+='<div style="margin-bottom:20"><div style="font-size:13px;color:var(--muted);margin-bottom:4">你的问题</div><div style="font-size:15px;font-weight:600;color:var(--primary)">「'+esc(s.q)+'」</div><div style="font-size:13px;color:var(--muted);margin-top:4">回应者：'+esc(s.phil?s.phil.name:'')+' · '+esc(s.phil?s.phil.school:'')+(s.mis?' <span style="color:var(--accent)">反差模式</span>':'')+'</div></div><hr style="border:none;border-top:1px solid var(--bg);margin-bottom:20">';
      var KS=['oneliner','analogy','deep','advice','alt'];
      var LS=['你的盲点','换个视角','哲思解剖','指向行动','另一种可能'];
      var ES=['🧠','📖','🔬','💡','🤔'];
      var R=s.resp;
      if(R){
        KS.forEach(function(k,i){
          if(!R[k]) return;
          h+='<div class="analysis-section">';
          h+='<div class="label">'+ES[i]+' '+LS[i]+'</div>';
          h+='<div class="content typewriter">'+esc(R[k])+'</div>';
          h+='</div>';
        });
      }
      if(s.td)h+='<button onclick="st({step:4})" style="width:100%;padding:12px 0;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:15px;font-family:var(--font);cursor:pointer;margin-top:10px">我要结语 →</button>';
    }
    h+='</div>';
  }

  if(s1===4){
    h+='<div class="fade-in"><div class="card"><div class="card-title">以东方智慧收尾</div><div class="w-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">';
    var wc=[{id:'buddhism',n:'佛',c:'#D4836D',bg:'linear-gradient(135deg,#FDF6F0,#F5E6DA)',ico:'🕉'},{id:'daoism',n:'道',c:'#5D7A6E',bg:'linear-gradient(135deg,#F0F5F2,#E0EDE5)',ico:'☯'},{id:'confucianism',n:'儒',c:'#8B4513',bg:'linear-gradient(135deg,#F5F0EB,#EDE0D5)',ico:'📚'}];
    wc.forEach(function(c){var a=s.wis===c.id;h+='<div onclick="var lst=WD[\''+c.id+'\']||[];st({wis:\''+c.id+'\',wq:lst.length?lst[Math.floor(Math.random()*lst.length)]:null})" style="padding:24px 16px;border-radius:12px;text-align:center;cursor:pointer;background:'+c.bg+';color:'+c.c+';border:'+(a?'3px solid var(--accent)':'3px solid transparent')+';min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center"><div style="font-size:36px;margin-bottom:8px">'+c.ico+'</div><div style="font-size:20px;font-weight:700">'+c.n+'</div></div>';});
    h+='</div></div>';
    if(s.wq){
      h+='<div id="scc" style="display:flex;flex-direction:column;align-items:center;margin-bottom:20"></div>';
      h+='<div style="background:linear-gradient(135deg,var(--primary),#2C5F7A);color:#fff;border-radius:12px;padding:32px;text-align:center">';
      h+='<div style="font-size:12px;opacity:.5;margin-bottom:8">'+(s.wis==='buddhism'?'佛家·禅意':s.wis==='daoism'?'道家·自然':'儒家·修身')+'</div>';
      h+='<div style="font-size:22px;line-height:1.8;margin-bottom:12;font-style:italic">「'+esc(s.wq.text)+'」</div>';
      h+='<div style="font-size:14px;opacity:.7;margin-bottom:16">—— '+esc(s.wq.source)+(s.wq.chapter?' · '+esc(s.wq.chapter):'')+'</div>';
      h+='<div style="font-size:15px;line-height:1.6;background:rgba(255,255,255,0.1);padding:16px;border-radius:8px;margin-bottom:20">'+esc(s.wq.explanation)+'</div>';
      h+='<button onclick="navigator.clipboard.writeText(\'「\'+S.wq.text+\'」—— \'+S.wq.source+\'\\n来自「我在故我在」哲学网站\').then(function(){alert(\'已复制\')}).catch(function(){var ta=document.createElement(\'textarea\');ta.value=\'「\'+S.wq.text+\'」—— \'+S.wq.source+\'\\n来自「我在故我在」哲学网站\';document.body.appendChild(ta);ta.select();document.execCommand(\'copy\');document.body.removeChild(ta);alert(\'已复制\')})" style="padding:10px 24px;border:2px solid rgba(255,255,255,0.3);border-radius:20px;background:transparent;color:#fff;cursor:pointer;font-size:13px;font-family:var(--font)">分享到朋友圈</button></div>';
    }
    h+='<button onclick="if(TMR)clearInterval(TMR);S={step:1,cat:\'\',q:\'\',phil:null,mis:false,vol:1,sch:\'\',load:false,wis:\'\',wq:null,act:\'\',txt:{},td:false,sg:0,resp:null};App()" style="display:block;margin:30px auto 0;padding:12px 40px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:15px;font-family:var(--font);cursor:pointer">再来一次</button></div>';
  }

  app.innerHTML = h;

  if(s1===4 && s.wq){
    setTimeout(function(){
      drawCanvas(s.wq.text, s.wq.source, s.wq.chapter, s.wis, function(r){
        var c=document.getElementById('scc');
        if(c){c.innerHTML=r.html;setTimeout(r.draw,300);}
      });
    }, 200);
  }
}

App();
</script>
</body>
</html>
